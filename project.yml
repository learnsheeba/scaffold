name: SwiftChat

options:
  bundleIdPrefix: com.swiftchat
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ""

# Consume the local Swift package that lives in this same directory.
# XcodeGen resolves a local package by the `path` to the folder containing
# Package.swift; products are referenced from the target `dependencies`.
packages:
  SwiftChat:
    path: "."

targets:
  # ---- iOS app ----
  SwiftChatIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/SwiftChatIOS
    dependencies:
      - package: SwiftChat
        products:
          - SwiftChatKit
          - SwiftChatUI
    info:
      properties:
        UILaunchScreen: {}
        NSPhotoLibraryUsageDescription: "SwiftChat needs access to your photos to share images."
        NSLocalNetworkUsageDescription: "SwiftChat connects to a chat server on your local network."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true

  # ---- macOS app ----
  SwiftChatMac:
    type: application
    platform: macOS
    sources:
      - path: Sources/SwiftChatMac
    dependencies:
      - package: SwiftChat
        products:
          - SwiftChatKit
          - SwiftChatUI
    info:
      properties:
        NSPhotoLibraryUsageDescription: "SwiftChat needs access to your photos to share images."
        NSLocalNetworkUsageDescription: "SwiftChat connects to a chat server on your local network."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true

  # ---- iOS UI / E2E test bundle (hosted by the iOS app) ----
  SwiftChatUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/SwiftChatUITests
    dependencies:
      - target: SwiftChatIOS

schemes:
  SwiftChatIOS:
    build:
      targets:
        SwiftChatIOS: all
        SwiftChatUITests: [test]
    test:
      targets:
        - SwiftChatUITests

  SwiftChatMac:
    build:
      targets:
        SwiftChatMac: all
